# jarl – themes
# ─────────────────────────────────────────────────────────────────────────────
#
# HOW TO ACTIVATE / DEACTIVATE A THEME
# ──────────────────────────────────────
# Set  enabled = true   to activate a theme.
# Set  enabled = false  to deactivate it.
#
# The active theme is selected from the theme picker (press 't' in jarl).
# Press 'T' to reload this file without restarting jarl.
#
# If no theme has  enabled = true, Catppuccin Mocha is used as fallback.
#
# HOW TO ADD A CUSTOM THEME
# ──────────────────────────
# Append a new [[themes]] block at the end of this file.
# All color values must be hex strings: "#rrggbb".
# Run  jarl --reset-themes  to restore this file to factory defaults.
#
# Fields:
#   bg        – main background
#   fg        – primary text
#   accent    – titles, highlighted keys, border accents
#   highlight – selected-row background
#   success   – live indicator, playing station name
#   warning   – connecting / paused state
#   error     – error messages
#   muted     – secondary text, genre labels
#   border    – box borders
#
# ─────────────────────────────────────────────────────────────────────────────

