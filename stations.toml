# jarl – station list
# ─────────────────────────────────────────────────────────────────────────────
# Supported formats: MP3 · AAC · OGG/Vorbis · FLAC
# Run 'jarl --reset-stations' to restore this file to factory defaults.
#
# HOW TO ADD A STATION
# ──────────────────────
# jarl needs a direct stream URL — not a webpage, not a playlist file.
#
# 1. GET THE DIRECT STREAM URL
#
#    From a .pls or .m3u playlist file:
#      curl -s "https://example.com/stream.pls" | grep "^File1"
#      curl -s "https://example.com/stream.m3u" | grep "^http"
#
#    From a webpage (radio.net, tunein, etc.):
#      Open in Firefox → F12 → Network tab → filter "Media"
#      → press Play → copy the URL of the audio request.
#
#    From SomaFM:
#      curl -s "https://somafm.com/CHANNELNAME256.pls" | grep "^File1"
#      (channel list: https://somafm.com/listen/)
#
# 2. VERIFY IT PLAYS AND CHECK THE BITRATE
#      mpv --no-video "YOUR_STREAM_URL"
#    mpv shows: "Audio: mp3, 44100 Hz, stereo, 256 kb/s"
#    Press q to stop once confirmed.
#
# 3. ADD IT HERE
#    Append a [[stations]] block and press 'r' inside jarl to reload.
#
# TEMPLATE:
#   [[stations]]
#   name    = "Station Name"
#   genre   = "Genre · Subgenre"
#   url     = "https://..."
#   bitrate = 256

